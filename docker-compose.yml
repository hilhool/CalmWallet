# Локальная разработка: docker compose up -d
# DATABASE_URL=postgresql://calmwallet:calmwallet@localhost:5432/calmwallet
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: calmwallet
      POSTGRES_PASSWORD: calmwallet
      POSTGRES_DB: calmwallet
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U calmwallet -d calmwallet"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
